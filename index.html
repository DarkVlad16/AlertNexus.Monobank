<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; base-uri 'none'; form-action https://send.monobank.ua">
  <title>AlertNexus · Monobank jar top-up</title>
  <style>
    :root{font-family:Inter,"Segoe UI",sans-serif;color:#f7f8fb;background:#080b12;--panel:#111722;--line:#29354a;--muted:#94a3b8;--accent:#7658ff;--green:#29d7a2}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 70% 0,#432d7d66,transparent 42%),#080b12}.page{width:min(100%,640px)}header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.brand{display:flex;align-items:center;gap:11px;font-size:20px;font-weight:800}.logo{display:grid;place-items:center;width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,#8b5cf6,#4f46e5);box-shadow:0 9px 26px #6d5af744}.language{display:flex;padding:3px;border:1px solid var(--line);border-radius:11px}.language button{padding:7px 11px;border:0;border-radius:8px;color:var(--muted);background:transparent;cursor:pointer}.language button.active{color:white;background:#29354a}.card{padding:28px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(145deg,#131a27,#0d131d);box-shadow:0 24px 70px #0005}h1{margin:0 0 8px;font-size:28px}p{margin:0;color:var(--muted);line-height:1.5}label{display:block;margin:16px 0 7px;color:#b7c3d5;font-size:13px}input,textarea{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;color:white;background:#090f18;font:inherit;outline:none}input:focus,textarea:focus{border-color:var(--accent)}textarea{min-height:104px;resize:vertical}.row{display:grid;grid-template-columns:1fr 150px;gap:10px}.preview{margin:18px 0;padding:13px;border:1px solid #344159;border-radius:10px;color:#dce4f0;background:#0a1019;overflow-wrap:anywhere}.preview small{display:block;margin-bottom:5px;color:var(--muted)}.primary{width:100%;padding:13px;border:0;border-radius:11px;color:white;background:linear-gradient(135deg,#8061ff,#6846ee);font:inherit;font-weight:800;cursor:pointer}.primary:disabled{opacity:.45;cursor:not-allowed}.privacy{display:flex;gap:8px;margin-top:14px;font-size:12px}.privacy span{color:var(--green)}.error{min-height:20px;margin-top:10px;color:#fda4af;font-size:13px}.setup{margin-top:14px;padding:12px;border:1px dashed #4a5870;border-radius:10px;font-size:12px}@media(max-width:520px){body{padding:14px}.card{padding:21px}.row{grid-template-columns:1fr}h1{font-size:24px}}
  </style>
</head>
<body>
  <main class="page">
    <header><div class="brand"><span class="logo">A</span>AlertNexus</div><div class="language"><button type="button" data-lang="uk">UA</button><button type="button" data-lang="en">EN</button></div></header>
    <section class="card">
      <h1 data-t="title"></h1>
      <p data-t="intro"></p>
      <form id="donationForm">
        <div class="row"><div><label for="nickname" data-t="nickname"></label><input id="nickname" autocomplete="nickname" maxlength="40" placeholder="DarkVlad"></div><div><label for="amount" data-t="amount"></label><input id="amount" type="number" inputmode="decimal" min="1" step="0.01" value="50.00" required></div></div>
        <label for="message" data-t="message"></label><textarea id="message" maxlength="158" data-placeholder="messagePlaceholder" required></textarea>
        <div class="preview"><small><span data-t="comment"></span> · <span id="commentCount">0/160</span></small><strong id="commentPreview">@DarkVlad</strong></div>
        <button id="pay" class="primary" type="submit" data-t="pay"></button>
        <div id="error" class="error" role="alert"></div>
      </form>
      <p id="setup" class="setup" data-t="setup" hidden></p>
      <p class="privacy"><span>●</span><span data-t="privacy"></span></p>
    </section>
  </main>
  <script>
    const translations={uk:{title:'Поповнення банки Monobank',intro:'Вкажіть повідомлення та, за бажанням, свій нік. Далі ви перейдете на офіційну сторінку оплати Monobank, а банківське ім’я не потрапить в алерт.',nickname:'Нік на платформі (необов’язково)',amount:'Сума, UAH',message:'Повідомлення',messagePlaceholder:'Дякую за стрім!',comment:'Коментар для Monobank',pay:'Перейти до Monobank',privacy:'Дані залишаються у вашому браузері й передаються лише Monobank.',setup:'Банку не налаштовано. Скопіюйте частину посилання після /jar/. Наприклад, для https://send.monobank.ua/jar/7Q7nzyPWdo додайте до адреси цієї сторінки ?jar=7Q7nzyPWdo.',invalidNick:'Нік має містити не більше 40 символів без пробілів.',invalidJar:'Посилання на банку некоректне.',commentTooLong:'Коментар Monobank має містити не більше 160 символів разом із ніком.'},en:{title:'Monobank jar top-up',intro:'Enter a message and, optionally, your nickname. You will continue to the official Monobank payment page, and your bank name will not appear in the alert.',nickname:'Platform nickname (optional)',amount:'Amount, UAH',message:'Message',messagePlaceholder:'Thanks for the stream!',comment:'Monobank comment',pay:'Continue to Monobank',privacy:'The data stays in your browser and is sent only to Monobank.',setup:'The jar is not configured. Copy the part after /jar/ from its link. For example, for https://send.monobank.ua/jar/7Q7nzyPWdo add ?jar=7Q7nzyPWdo to this page URL.',invalidNick:'Use at most 40 characters without spaces.',invalidJar:'The jar link is invalid.',commentTooLong:'The Monobank comment must be at most 160 characters including the nickname.'}};
    const params=new URLSearchParams(location.search),nickname=document.querySelector('#nickname'),amount=document.querySelector('#amount'),message=document.querySelector('#message'),preview=document.querySelector('#commentPreview'),commentCount=document.querySelector('#commentCount'),error=document.querySelector('#error'),pay=document.querySelector('#pay'),setup=document.querySelector('#setup'),maxCommentLength=160;
    const languageKey='alertnexus-language',savedLanguage=()=>{try{return localStorage.getItem(languageKey)}catch{return null}},rememberLanguage=()=>{try{localStorage.setItem(languageKey,lang)}catch{}};
    let lang=[params.get('lang'),savedLanguage()].find(value=>value==='uk'||value==='en')||((navigator.language||'').toLowerCase().startsWith('uk')?'uk':'en');
    const jarTarget=raw=>{if(!raw)return null;const value=/^[\w-]{5,64}$/.test(raw)?`https://send.monobank.ua/jar/${raw}`:raw;try{const url=new URL(value);return url.protocol==='https:'&&url.hostname==='send.monobank.ua'&&url.pathname.startsWith('/jar/')?url:null}catch{return null}};
    const jar=jarTarget(params.get('jar'));
    const comment=()=>{const nick=nickname.value.trim().replace(/^@/,''),text=message.value.trim();return nick?`@${nick}${text?` ${text}`:''}`:text};
    const update=()=>{const nick=nickname.value.trim().replace(/^@/,''),value=comment(),prefix=nick?`@${nick} `:'';preview.textContent=value;commentCount.textContent=`${value.length}/${maxCommentLength}`;message.maxLength=Math.max(0,maxCommentLength-prefix.length);error.textContent=value.length>maxCommentLength?translations[lang].commentTooLong:''};
    const translate=()=>{document.documentElement.lang=lang;document.querySelectorAll('[data-t]').forEach(node=>node.textContent=translations[lang][node.dataset.t]);document.querySelectorAll('[data-placeholder]').forEach(node=>node.placeholder=translations[lang][node.dataset.placeholder]);document.querySelectorAll('[data-lang]').forEach(button=>button.classList.toggle('active',button.dataset.lang===lang));setup.hidden=!!jar;pay.disabled=!jar};
    nickname.value=(params.get('nick')||'').replace(/^@/,'');amount.value=params.get('amount')||'50.00';message.value=params.get('message')||'';rememberLanguage();update();translate();
    document.querySelector('.language').onclick=event=>{const button=event.target.closest('[data-lang]');if(button){lang=button.dataset.lang;rememberLanguage();translate()}};
    nickname.oninput=message.oninput=update;
    document.querySelector('#donationForm').onsubmit=event=>{event.preventDefault();const nick=nickname.value.trim().replace(/^@/,''),value=comment();if(nick&&!/^\S{1,40}$/u.test(nick)){error.textContent=translations[lang].invalidNick;nickname.focus();return}if(value.length>maxCommentLength){error.textContent=translations[lang].commentTooLong;message.focus();return}if(!jar){error.textContent=translations[lang].invalidJar;return}const target=new URL(jar);target.searchParams.set('a',Number(amount.value).toFixed(2));target.searchParams.set('t',value);location.href=target.toString()};
  </script>
</body>
</html>
